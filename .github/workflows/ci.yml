name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: IHE_ERP_2024!
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ODBC Driver 18
        run: |
          curl -s https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -s https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cp .env.template .env
          echo "SQL_SERVER=localhost" >> .env
          echo "SQL_DRIVER=ODBC Driver 18 for SQL Server" >> .env

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -C -Q "SELECT 1" && break
            sleep 2
          done

      - name: Run DDL
        run: |
          python -c "
          import pyodbc
          conn = pyodbc.connect('DRIVER={ODBC Driver 18 for SQL Server};SERVER=localhost;DATABASE=master;UID=sa;PWD=IHE_ERP_2024!;TrustServerCertificate=yes', timeout=30)
          conn.execute('IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = \"IHE_ERP\") CREATE DATABASE IHE_ERP')
          conn.close()
          "
          for f in 07_Neural_AI_Tables.sql 08_Document_System.sql; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -d IHE_ERP -C -i "$f"
          done

      - name: Run migrations
        run: |
          for f in migrations/0*.py migrations/99_rollback.py; do
            [ -f "$f" ] && python "$f" || true
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run lint
        run: pip install ruff && ruff check . --output-format=github
        continue-on-error: true
