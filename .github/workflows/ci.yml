name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: IHE_ERP_2024!
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cp .env.template .env
          sed -i 's/^SQL_SERVER=.*/SQL_SERVER=localhost/' .env
          sed -i 's/^SQL_PASSWORD=.*/SQL_PASSWORD=IHE_ERP_2024!/' .env

      - name: Verify SQL, create DB
        run: |
          odbcinst -j
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -C -Q "SELECT 1" && break
            sleep 2
          done
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -C -Q "
          IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'IHE_ERP')
          CREATE DATABASE IHE_ERP
          "

      - name: Run DDL scripts
        run: |
          for f in 07_Neural_AI_Tables.sql 08_Document_System.sql; do
            if [ -f "$f" ]; then
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IHE_ERP_2024!' -d IHE_ERP -C -i "$f"
            fi
          done

      - name: Create all ORM tables
        run: |
          python -c "
          from app.database import init_db
          init_db()
          print('All 26 ORM tables created.')
          "

      - name: Run migrations
        run: |
          for f in migrations/0*.py migrations/99_rollback.py; do
            [ -f "$f" ] && python "$f" || true
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run lint
        run: pip install ruff && ruff check . --output-format=github
        continue-on-error: true
