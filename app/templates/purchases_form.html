{% extends "base.html" %}
{% block title %}{{ title }} - IncentiveHouse ERP{% endblock %}
{% block ai_context %}Purchase Form{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>
<div class="card" style="max-width:800px">
    <form id="purForm" data-draft data-record-id="{{ record_id | default('new') }}" onsubmit="return savePur(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Voucher Number</label>
                <input type="text" id="VoucherNumber" class="form-control" value="{{ vch.VoucherNumber if vch else '' }}">
            </div>
            <div class="form-group">
                <label>Document Number</label>
                <input type="text" id="DocumentNumber" class="form-control" value="{{ vch.DocumentNumber if vch else '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>PNR Number</label>
                <input type="text" id="PNRNumber" class="form-control" value="{{ vch.PNRNumber if vch else '' }}">
            </div>
            <div class="form-group">
                <label>Event Name</label>
                <input type="text" id="EventName" class="form-control" value="{{ vch.EventName if vch else '' }}">
            </div>
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="InvoiceDate" class="form-control" value="{{ vch.InvoiceDate if vch else '' }}">
            </div>
            <div class="form-group">
                <label>Total Value</label>
                <input type="number" step="0.01" id="TotalValue" class="form-control" value="{{ vch.TotalValue if vch else '' }}">
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select id="CurrencyCode" class="form-control">
                    <option value="EGP" {% if vch and vch.CurrencyCode == 'EGP' %}selected{% endif %}>EGP</option>
                    <option value="USD" {% if vch and vch.CurrencyCode == 'USD' %}selected{% endif %}>USD</option>
                </select>
            </div>
        </div>
        <div id="purFormError" class="alert alert-danger" style="display:none"></div>
        <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Voucher</button>
            <a href="/pur" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
<script>
function savePur(e) {
    e.preventDefault();
    var data = {
        VoucherNumber: document.getElementById('VoucherNumber').value.trim() || null,
        DocumentNumber: document.getElementById('DocumentNumber').value.trim() || null,
        PNRNumber: document.getElementById('PNRNumber').value.trim() || null,
        EventName: document.getElementById('EventName').value.trim() || null,
        InvoiceDate: document.getElementById('InvoiceDate').value || null,
        TotalValue: document.getElementById('TotalValue').value ? parseFloat(document.getElementById('TotalValue').value) : null,
        CurrencyCode: document.getElementById('CurrencyCode').value || null,
        lines: []
    };
    var token = localStorage.getItem('access_token');
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/pur/vouchers', { method: 'POST', headers: headers, body: JSON.stringify(data) })
        .then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Save failed'); }); return r.json(); })
        .then(function() { window.location.href = '/pur'; })
        .catch(function(err) { document.getElementById('purFormError').textContent = err.message; document.getElementById('purFormError').style.display = ''; });
    return false;
}
</script>
{% endblock %}
