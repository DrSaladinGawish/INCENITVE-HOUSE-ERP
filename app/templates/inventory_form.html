{% extends "base.html" %}
{% block title %}{{ title }} - IncentiveHouse ERP{% endblock %}
{% block ai_context %}Inventory Form{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>
<div class="card" style="max-width:800px">
    <form id="invForm" data-draft data-record-id="{{ record_id | default('new') }}" data-meta-config="/api/meta/config/inventory_item" onsubmit="return saveInv(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Item Code *</label>
                <input type="text" id="ItemCode" class="form-control" value="{{ item.ItemCode if item else '' }}" required>
            </div>
            <div class="form-group">
                <label>Item Name *</label>
                <input type="text" id="ItemName" class="form-control" value="{{ item.ItemName if item else '' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>SKU</label>
                <input type="text" id="SKU" class="form-control" value="{{ item.SKU if item else '' }}">
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" id="Category" class="form-control" value="{{ item.Category if item else '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Unit of Measure</label>
                <select id="UnitOfMeasure" class="form-control">
                    <option value="Each" {% if item and item.UnitOfMeasure == 'Each' %}selected{% endif %}>Each</option>
                    <option value="Kg" {% if item and item.UnitOfMeasure == 'Kg' %}selected{% endif %}>Kg</option>
                    <option value="Ltr" {% if item and item.UnitOfMeasure == 'Ltr' %}selected{% endif %}>Ltr</option>
                    <option value="Mtr" {% if item and item.UnitOfMeasure == 'Mtr' %}selected{% endif %}>Mtr</option>
                    <option value="Box" {% if item and item.UnitOfMeasure == 'Box' %}selected{% endif %}>Box</option>
                </select>
            </div>
            <div class="form-group">
                <label>GL Account</label>
                <input type="text" id="GLAccount" class="form-control" value="{{ item.GLAccount if item else '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="Description" class="form-control" rows="3">{{ item.Description if item else '' }}</textarea>
        </div>
        <fieldset style="border:1px solid rgba(197,165,90,0.3); border-radius:8px; padding:16px; margin:12px 0">
            <legend style="font-size:13px; font-weight:600; color:#C5A55A; padding:0 8px">Pricing & VAT</legend>
            <div class="form-row-3">
                <div class="form-group">
                    <label>Unit Price (excl. VAT)</label>
                    <input type="number" step="0.01" id="UnitPrice" class="form-control" value="{{ item.UnitPrice if item else '' }}" oninput="calcInvVat()">
                </div>
                <div class="form-group">
                    <label>VAT Rate (%)</label>
                    <input type="number" step="0.01" id="VATRate" class="form-control" value="{{ item.VATRate if item else '14' }}" oninput="calcInvVat()">
                </div>
                <div class="form-group">
                    <label>Price (incl. VAT)</label>
                    <input type="number" step="0.01" id="PriceInclVAT" class="form-control" value="0" readonly style="background:rgba(197,165,90,0.05)">
                </div>
            </div>
        </fieldset>
        <div id="invFormError" class="alert alert-danger" style="display:none"></div>
        <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Item</button>
            <a href="/inventory" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
<script>
function calcInvVat() {
    var price = parseFloat(document.getElementById('UnitPrice').value) || 0;
    var rate = parseFloat(document.getElementById('VATRate').value) || 0;
    document.getElementById('PriceInclVAT').value = (price * (1 + rate / 100)).toFixed(2);
}
function saveInv(e) {
    e.preventDefault();
    var data = {
        ItemCode: document.getElementById('ItemCode').value.trim(),
        ItemName: document.getElementById('ItemName').value.trim(),
        SKU: document.getElementById('SKU').value.trim() || null,
        Category: document.getElementById('Category').value.trim() || null,
        Description: document.getElementById('Description').value.trim() || null,
        UnitPrice: parseFloat(document.getElementById('UnitPrice').value) || null,
        UnitOfMeasure: document.getElementById('UnitOfMeasure').value || null,
        VATRate: parseFloat(document.getElementById('VATRate').value) || 14,
        GLAccount: document.getElementById('GLAccount').value.trim() || null,
    };
    var token = localStorage.getItem('access_token');
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/inventory/items', { method: 'POST', headers: headers, body: JSON.stringify(data) })
        .then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Save failed'); }); return r.json(); })
        .then(function() { window.location.href = '/inventory'; })
        .catch(function(err) { document.getElementById('invFormError').textContent = err.message; document.getElementById('invFormError').style.display = ''; });
    return false;
}
</script>
{% endblock %}
