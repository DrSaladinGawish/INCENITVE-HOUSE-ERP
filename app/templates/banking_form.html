{% extends "base.html" %}
{% block title %}{{ title }} - IncentiveHouse ERP{% endblock %}
{% block ai_context %}Banking Form{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>
<div class="card" style="max-width:800px">
    <form id="bnkForm" data-draft data-record-id="{{ record_id | default('new') }}" data-meta-config="/api/meta/config/bank_transaction" onsubmit="return saveBnk(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Transaction Date *</label>
                <input type="date" id="TransactionDate" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Bank Code</label>
                <input type="text" id="BankCode" class="form-control" placeholder="e.g. CIB">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Payee</label>
                <input type="text" id="Payee" class="form-control">
            </div>
            <div class="form-group">
                <label>Transaction Type</label>
                <select id="TransactionType" class="form-control">
                    <option value="Deposit">Deposit</option>
                    <option value="Withdrawal">Withdrawal</option>
                    <option value="Transfer">Transfer</option>
                </select>
            </div>
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Deposit Amount</label>
                <input type="number" step="0.01" id="Deposit" class="form-control" value="0">
            </div>
            <div class="form-group">
                <label>Withdrawal Amount</label>
                <input type="number" step="0.01" id="Withdrawal" class="form-control" value="0">
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select id="CurrencyCode" class="form-control">
                    <option value="EGP">EGP</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Document Type</label>
                <input type="text" id="DocumentType" class="form-control" placeholder="e.g. Cheque, Transfer">
            </div>
            <div class="form-group">
                <label>Document Number</label>
                <input type="text" id="DocumentNumber" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label>Narration</label>
            <textarea id="Narration" class="form-control" rows="2"></textarea>
        </div>
        <div id="bnkFormError" class="alert alert-danger" style="display:none"></div>
        <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Transaction</button>
            <a href="/bnk" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
<script>
function saveBnk(e) {
    e.preventDefault();
    var data = {
        TransactionDate: document.getElementById('TransactionDate').value,
        Payee: document.getElementById('Payee').value.trim() || null,
        BankCode: document.getElementById('BankCode').value.trim() || null,
        TransactionType: document.getElementById('TransactionType').value || null,
        Deposit: parseFloat(document.getElementById('Deposit').value) || 0,
        Withdrawal: parseFloat(document.getElementById('Withdrawal').value) || 0,
        CurrencyCode: document.getElementById('CurrencyCode').value,
        DocumentType: document.getElementById('DocumentType').value.trim() || null,
        DocumentNumber: document.getElementById('DocumentNumber').value.trim() || null,
        Narration: document.getElementById('Narration').value.trim() || null
    };
    if (!data.TransactionDate) { document.getElementById('bnkFormError').textContent = 'Transaction Date is required'; document.getElementById('bnkFormError').style.display = ''; return false; }
    var token = localStorage.getItem('access_token');
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/bnk/transactions', { method: 'POST', headers: headers, body: JSON.stringify(data) })
        .then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Save failed'); }); return r.json(); })
        .then(function() { window.location.href = '/bnk'; })
        .catch(function(err) { document.getElementById('bnkFormError').textContent = err.message; document.getElementById('bnkFormError').style.display = ''; });
    return false;
}
</script>
{% endblock %}
