{% extends "base.html" %}
{% block title %}Audit Log - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Audit Trail Viewer</h1>
    <p>Review system changes, user actions, and data modifications</p>
</div>
<div class="card">
    <div class="card-header">Filters</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
        <div class="form-group" style="margin:0"><label>Table</label><input type="text" id="filterTable" class="form-control" placeholder="e.g. PNRMaster" style="width:160px"></div>
        <div class="form-group" style="margin:0"><label>User</label><input type="text" id="filterUser" class="form-control" placeholder="User" style="width:140px"></div>
        <div class="form-group" style="margin:0"><label>Action</label><select id="filterAction" class="form-control" style="width:120px"><option value="">All</option><option value="INSERT">Insert</option><option value="UPDATE">Update</option><option value="DELETE">Delete</option></select></div>
        <button class="btn btn-primary btn-sm" onclick="loadAudit()">Search</button>
    </div>
</div>
<div class="card">
    <table>
        <thead><tr><th data-sort="timestamp">Timestamp</th><th data-sort="user">User</th><th data-sort="action">Action</th><th data-sort="table">Table</th><th data-sort="record">Record ID</th><th data-sort="changes">Changes</th></tr></thead>
        <tbody id="auditBody"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
    </table>
    <div class="pagination" id="auditPagination"></div>
</div>
<script>
var page = 1;
function loadAudit() {
    var params = 'page=' + page + '&per_page=25';
    var t = document.getElementById('filterTable').value;
    if (t) params += '&table=' + encodeURIComponent(t);
    var u = document.getElementById('filterUser').value;
    if (u) params += '&user=' + encodeURIComponent(u);
    var a = document.getElementById('filterAction').value;
    if (a) params += '&action=' + a;
    fetch('/api/v1/intelligence/audit?' + params, {headers: {'Authorization': 'Bearer ' + (localStorage.getItem('access_token') || '')}})
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(d) {
            var items = d.items || d || [];
            var body = document.getElementById('auditBody');
            if (!items.length) { body.innerHTML = '<tr><td colspan="6" style="text-align:center">No audit records found.</td></tr>'; return; }
            body.innerHTML = items.map(function(a) {
                return '<tr><td>' + (a.timestamp || a.created_at || '') + '</td><td>' + (a.user || a.username || 'system') + '</td><td><span class="badge ' + (a.action === 'INSERT' ? 'badge-success' : a.action === 'DELETE' ? 'badge-danger' : 'badge-info') + '">' + (a.action || 'UPDATE') + '</span></td><td>' + (a.table_name || a.table || '') + '</td><td>' + (a.record_id || '') + '</td><td>' + (a.changes || a.details || '-') + '</td></tr>';
            }).join('');
        }).catch(function() { document.getElementById('auditBody').innerHTML = '<tr><td colspan="6" style="text-align:center">Error loading audit log.</td></tr>'; });
}
document.addEventListener('DOMContentLoaded', function() { loadAudit(); });
</script>
{% endblock %}
