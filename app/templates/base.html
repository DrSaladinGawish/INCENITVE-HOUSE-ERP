<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IncentiveHouse ERP{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/ihe_logo.png">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --bg: #f8f9fa;
            --sidebar-bg: #1a1a2e;
            --sidebar-text: #e0e0e0;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #dee2e6;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --orb-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
            --radius: 10px;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
        
        /* Sidebar */
        .sidebar {
            width: 240px; background: var(--sidebar-bg); color: var(--sidebar-text);
            min-height: 100vh; padding: 0; display: flex; flex-direction: column;
            position: fixed; left: 0; top: 0; z-index: 100;
        }
        .sidebar .logo-area {
            padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo-area img { max-height: 50px; }
        .sidebar .logo-area h2 { font-size: 14px; color: #fff; margin-top: 8px; font-weight: 300; letter-spacing: 1px; }
        .sidebar nav { padding: 10px 0; flex: 1; }
        .sidebar nav a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; color: var(--sidebar-text); text-decoration: none;
            font-size: 14px; transition: var(--transition); border-left: 3px solid transparent;
        }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.08); border-left-color: var(--primary-light); }
        .sidebar nav a .icon { width: 20px; text-align: center; font-size: 16px; }
        .sidebar .footer { padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; text-align: center; color: rgba(255,255,255,0.4); }
        .sidebar .footer img { max-height: 30px; margin-bottom: 5px; }
        
        /* Main content */
        .main-content { margin-left: 240px; flex: 1; padding: 25px 30px; min-height: 100vh; }
        .page-header { margin-bottom: 25px; }
        .page-header h1 { font-size: 24px; font-weight: 600; color: var(--primary); }
        .page-header p { color: var(--text-light); font-size: 14px; margin-top: 4px; }
        
        /* Cards */
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .card-header { font-size: 16px; font-weight: 600; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: var(--bg); font-weight: 600; color: var(--text-light); }
        tr:hover { background: rgba(0,0,0,0.02); }
        
        /* Charts area */
        .chart-container { width: 100%; height: 300px; position: relative; }
        
        /* Stats grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-card .stat-label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-light); }
        .form-control { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(41,128,185,0.15); }
        select.form-control { appearance: auto; }
        .btn { padding: 9px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; }
        .pagination a, .pagination span { padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; text-decoration: none; color: var(--text); font-size: 13px; }
        .pagination a:hover { background: var(--primary); color: #fff; }
        .pagination .active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        /* Badges */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        .badge-secondary { background: #e2e3e5; color: #383d41; }
        
        /* Smart presentation - KPI cards */
        .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-bottom:24px; }
        .kpi-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; display:flex; gap:14px; align-items:flex-start; transition:var(--transition); }
        .kpi-card:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(0,0,0,0.15); }
        .kpi-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
        .kpi-icon.blue { background:#e8f4fd; } .kpi-icon.green { background:#e8f8ef; } .kpi-icon.orange { background:#fef3e2; } .kpi-icon.purple { background:#f0ebff; }
        .kpi-body { flex:1; min-width:0; }
        .kpi-label { font-size:11px; color:var(--text-light); text-transform:uppercase; letter-spacing:.5px; display:block; }
        .kpi-value { font-size:24px; font-weight:700; color:var(--primary); display:block; margin:4px 0; }
        .kpi-delta { font-size:11px; display:block; }
        .kpi-delta.positive { color:var(--success); } .kpi-delta.warning { color:var(--warning); } .kpi-delta.negative { color:var(--danger); }
        .kpi-spark { width:60px; height:30px; flex-shrink:0; }
        /* Charts grid */
        .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
        .chart-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }
        .chart-card.wide { grid-column:1/-1; }
        .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
        .chart-header h3 { font-size:14px; font-weight:600; }
        .chart-controls { display:flex; gap:6px; align-items:center; }
        .chart-controls select { padding:3px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; background:var(--card-bg); }
        .chart-controls button { width:28px; height:28px; border:1px solid var(--border); border-radius:4px; background:var(--card-bg); cursor:pointer; font-size:12px; transition:var(--transition); }
        .chart-controls button:hover { background:var(--bg); }
        .chart-body { height:300px; }
        /* Report builder */
        .report-panel { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:24px; }
        .report-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
        .report-header h2 { font-size:18px; font-weight:600; }
        .report-builder { display:grid; grid-template-columns:220px 1fr; gap:20px; }
        .report-fields h4, .report-canvas h4 { font-size:13px; font-weight:600; margin-bottom:10px; }
        .field-list { display:flex; flex-direction:column; gap:4px; max-height:400px; overflow-y:auto; }
        .field-item { padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:6px; font-size:12px; cursor:grab; transition:var(--transition); }
        .field-item:hover { border-color:var(--primary-light); background:#e8f4fd; }
        .field-item.dragging { opacity:.5; }
        .canvas-dropzone { min-height:120px; border:2px dashed var(--border); border-radius:8px; padding:12px; margin-bottom:12px; display:flex; flex-wrap:wrap; gap:6px; transition:var(--transition); }
        .canvas-dropzone.drag-over { border-color:var(--primary-light); background:#e8f4fd; }
        .canvas-placeholder { width:100%; text-align:center; color:var(--text-light); font-size:12px; padding:30px 0; }
        .canvas-field { padding:6px 12px; background:var(--primary); color:#fff; border-radius:6px; font-size:11px; display:flex; align-items:center; gap:6px; }
        .canvas-field .remove { cursor:pointer; font-size:14px; opacity:.7; }
        .canvas-field .remove:hover { opacity:1; }
        .filter-row { display:flex; gap:6px; margin-bottom:8px; }
        .filter-row select, .filter-row input { padding:5px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; }
        .filter-row button { padding:5px 10px; border:none; border-radius:4px; background:var(--primary); color:#fff; cursor:pointer; font-size:14px; }
        .active-filters { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
        .active-filter { padding:3px 8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; font-size:11px; display:flex; align-items:center; gap:4px; }
        .active-filter .remove { cursor:pointer; font-size:12px; }
        .report-preview { margin-top:12px; }
        .preview-table { width:100%; border-collapse:collapse; font-size:12px; }
        .preview-table th { background:var(--bg); padding:8px 10px; text-align:left; font-weight:600; color:var(--text-light); border-bottom:2px solid var(--border); }
        .preview-table td { padding:7px 10px; border-bottom:1px solid var(--border); }
        .preview-table tr:hover { background:rgba(0,0,0,.02); }
        /* Responsive */
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns:1fr; }
            .report-builder { grid-template-columns:1fr; }
        }
        
        /* Floating AI Orb */
        .ai-orb { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        .ai-orb-toggle {
            width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
            background: var(--orb-bg); color: #fff; font-size: 24px; box-shadow: 0 4px 20px rgba(102,126,234,0.4);
            transition: var(--transition); display: flex; align-items: center; justify-content: center;
            position: relative; animation: orb-pulse 3s infinite;
        }
        .ai-orb-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 25px rgba(102,126,234,0.6); }
        @keyframes orb-pulse { 0%,100% { box-shadow: 0 4px 20px rgba(102,126,234,0.4); } 50% { box-shadow: 0 4px 30px rgba(102,126,234,0.7); } }
        .ai-orb-panel {
            position: absolute; bottom: 65px; right: 0; width: 380px; max-height: 500px;
            background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none; flex-direction: column; overflow: hidden;
        }
        .ai-orb-panel.open { display: flex; }
        .ai-orb-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .ai-orb-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-light); border-bottom: 2px solid transparent; transition: var(--transition); }
        .ai-orb-tab:hover { color: var(--primary); }
        .ai-orb-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .ai-orb-body { padding: 15px; overflow-y: auto; max-height: 350px; }
        .ai-orb-body textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; resize: vertical; font-size: 13px; min-height: 80px; }
        .ai-orb-body .ai-response { margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 6px; font-size: 13px; white-space: pre-wrap; display: none; }
        
        /* Alerts */
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar nav a span { display: none; }
            .sidebar .logo-area h2, .sidebar .footer { display: none; }
            .main-content { margin-left: 60px; padding: 15px; }
            .ai-orb-panel { width: 300px; right: 0; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <img src="/static/ihe_logo.png" alt="IHE" onerror="this.style.display='none'">
            <h2>INCENTIVE HOUSE</h2>
        </div>
        <nav>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span><span>Dashboard</span>
            </a>
            <a href="/evn" class="{% if request.url.path.startswith('/evn') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="2" y="4" width="20" height="18" rx="2"/><path d="M2 10h20"/><path d="M8 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M16 18h.01"/></svg></span><span>Events (PNR)</span>
            </a>
            <a href="/sal" class="{% if request.url.path.startswith('/sal') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span><span>Sales</span>
            </a>
            <a href="/pur" class="{% if request.url.path.startswith('/pur') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span><span>Purchases</span>
            </a>
            <a href="/bnk" class="{% if request.url.path.startswith('/bnk') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 12 12 2 23 12"/><path d="M5 12v7h14v-7"/><rect x="8" y="14" width="8" height="4"/></svg></span><span>Banking</span>
            </a>
            <a href="/gl" class="{% if request.url.path.startswith('/gl') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span><span>General Ledger</span>
            </a>
            <a href="/documents" class="{% if request.url.path.startswith('/document') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></span><span>Documents</span>
            </a>
            <a href="/reports" class="{% if request.url.path.startswith('/report') %}active{% endif %}">
                <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M9 12h6"/><path d="M12 9v6"/></svg></span><span>Reports</span>
            </a>
        </nav>
        <div class="footer">
            <img src="/static/ihe_logo.png" alt="IHE" onerror="this.style.display='none'" style="max-height:24px">
            <div>&copy; 2026 Incentive House ERP</div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- AI Smart Window (modular widget) -->
    <script src="/static/ai_smart_window.js" data-context="{% block ai_context %}ERP{% endblock %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
