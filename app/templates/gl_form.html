{% extends "base.html" %}
{% block title %}{{ title }} - IncentiveHouse ERP{% endblock %}
{% block ai_context %}GL Form{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>
<div class="card" style="max-width:800px">
    <form id="glForm" data-draft data-record-id="{{ record_id | default('new') }}" data-meta-config="/api/meta/config/journal_voucher" onsubmit="return saveGl(event)">
        <div class="form-row">
            <div class="form-group">
                <label>JV Number *</label>
                <input type="text" id="JVNumber" class="form-control" required>
            </div>
            <div class="form-group">
                <label>JV Date</label>
                <input type="date" id="JVDate" class="form-control">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Total Debit</label>
                <input type="number" step="0.01" id="TotalDebit" class="form-control" value="0">
            </div>
            <div class="form-group">
                <label>Total Credit</label>
                <input type="number" step="0.01" id="TotalCredit" class="form-control" value="0">
            </div>
        </div>
        <div class="form-group">
            <label>Narration</label>
            <textarea id="Narration" class="form-control" rows="2"></textarea>
        </div>
        <div id="glFormError" class="alert alert-danger" style="display:none"></div>
        <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Journal Voucher</button>
            <a href="/gl" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
<script>
function saveGl(e) {
    e.preventDefault();
    var data = {
        JVNumber: document.getElementById('JVNumber').value.trim(),
        JVDate: document.getElementById('JVDate').value || null,
        TotalDebit: parseFloat(document.getElementById('TotalDebit').value) || 0,
        TotalCredit: parseFloat(document.getElementById('TotalCredit').value) || 0,
        Narration: document.getElementById('Narration').value.trim() || null,
        lines: []
    };
    if (!data.JVNumber) { document.getElementById('glFormError').textContent = 'JV Number is required'; document.getElementById('glFormError').style.display = ''; return false; }
    var token = localStorage.getItem('access_token');
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/gl/vouchers', { method: 'POST', headers: headers, body: JSON.stringify(data) })
        .then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Save failed'); }); return r.json(); })
        .then(function() { window.location.href = '/gl'; })
        .catch(function(err) { document.getElementById('glFormError').textContent = err.message; document.getElementById('glFormError').style.display = ''; });
    return false;
}
</script>
{% endblock %}
