{% extends "base.html" %}
{% block title %}{{ title }} List{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ title }} List</h2>
    <a href="/meta/forms/{{ form_name }}/new" class="btn btn-primary">New {{ title }}</a>
  </div>
  <table class="table table-striped" id="meta-table">
    <thead id="meta-table-head"></thead>
    <tbody id="meta-table-body"></tbody>
  </table>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var endpoints = {{ endpoints | tojson }};
  var listUrl = endpoints.list || '/api/' + '{{ form_name }}'.replace(/_/g, '/');
  var fields = {{ all_fields | tojson }};
  var listFields = fields.filter(function(f) { return f.type !== 'hidden'; }).slice(0, 8);
  fetch(listUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var items = Array.isArray(data) ? data : (data.items || data.data || []);
      var head = '<tr>' + listFields.map(function(f) { return '<th>' + f.label + '</th>'; }).join('') + '<th>Actions</th></tr>';
      document.getElementById('meta-table-head').innerHTML = head;
      var body = items.map(function(item) {
        return '<tr>' + listFields.map(function(f) {
          return '<td>' + (item[f.name] || '') + '</td>';
        }).join('') + '<td><a href="/meta/forms/{{ form_name }}/edit/' + (item.id || item.ID || '') + '" class="btn btn-sm btn-outline-primary">Edit</a></td></tr>';
      }).join('');
      document.getElementById('meta-table-body').innerHTML = body;
    });
});
</script>
{% endblock %}
