{% extends "base.html" %}
{% block title %}{{ title }} - IncentiveHouse ERP{% endblock %}
{% block ai_context %}Sales Form{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>
<div class="card" style="max-width:800px">
    <form id="salForm" data-draft data-record-id="{{ record_id | default('new') }}" onsubmit="return saveSal(event)" data-meta-config="/api/meta/config/sales_invoice" data-meta-vat='{"vatRateField":"VATRate","subtotalField":"SubTotal","vatAmountField":"VATAmount","totalField":"TotalValue"}'>
        <div class="form-row">
            <div class="form-group">
                <label>Invoice Number</label>
                <input type="text" id="InvoiceNumber" class="form-control" value="{{ inv.InvoiceNumber if inv else '' }}">
            </div>
            <div class="form-group">
                <label>Client Code *</label>
                <input type="text" id="ClientCode" class="form-control" value="{{ inv.ClientCode if inv else '' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>PNR Number</label>
                <input type="text" id="PNRNumber" class="form-control" value="{{ inv.PNRNumber if inv else '' }}">
            </div>
            <div class="form-group">
                <label>Event Name</label>
                <input type="text" id="EventName" class="form-control" value="{{ inv.EventName if inv else '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="InvoiceDate" class="form-control" value="{{ inv.InvoiceDate if inv else '' }}">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="DueDate" class="form-control" value="{{ inv.DueDate if inv else '' }}">
            </div>
        </div>
        <fieldset style="border:1px solid rgba(197,165,90,0.3); border-radius:8px; padding:16px; margin:12px 0">
            <legend style="font-size:13px; font-weight:600; color:#C5A55A; padding:0 8px">VAT Breakdown</legend>
            <div class="form-row-3">
                <div class="form-group">
                    <label>Subtotal (excl. VAT)</label>
                    <input type="number" step="0.01" id="SubTotal" class="form-control" value="{{ inv.SubTotal if inv else '' }}" oninput="calcSalVat()">
                </div>
                <div class="form-group">
                    <label>VAT Rate (%)</label>
                    <input type="number" step="0.01" id="VATRate" class="form-control" value="14" oninput="calcSalVat()">
                </div>
                <div class="form-group">
                    <label>VAT Amount</label>
                    <input type="number" step="0.01" id="VATAmount" class="form-control" value="{{ inv.VATAmount if inv else '0' }}" readonly style="background:rgba(197,165,90,0.05)">
                </div>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label>Total Value (incl. VAT)</label>
                    <input type="number" step="0.01" id="TotalValue" class="form-control" value="{{ inv.TotalValue if inv else '' }}" readonly style="background:rgba(197,165,90,0.05)">
                </div>
                <div class="form-group">
                    <label>Collected Amount</label>
                    <input type="number" step="0.01" id="CollectedAmount" class="form-control" value="{{ inv.CollectedAmount if inv else '' }}">
                </div>
                <div class="form-group">
                    <label>Currency</label>
                    <select id="CurrencyCode" class="form-control">
                        <option value="EGP" {% if inv and inv.CurrencyCode == 'EGP' %}selected{% endif %}>EGP</option>
                        <option value="USD" {% if inv and inv.CurrencyCode == 'USD' %}selected{% endif %}>USD</option>
                    </select>
                </div>
            </div>
        </fieldset>
        <div class="form-group">
            <label>Payment Status</label>
            <select id="PaymentStatus" class="form-control">
                <option value="Unpaid" {% if inv and inv.PaymentStatus == 'Unpaid' %}selected{% endif %}>Unpaid</option>
                <option value="Partial" {% if inv and inv.PaymentStatus == 'Partial' %}selected{% endif %}>Partial</option>
                <option value="Paid" {% if inv and inv.PaymentStatus == 'Paid' %}selected{% endif %}>Paid</option>
            </select>
        </div>
        <div id="salFormError" class="alert alert-danger" style="display:none"></div>
        <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Invoice</button>
            <a href="/sal" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
<script>
function calcSalVat() {
    var sub = parseFloat(document.getElementById('SubTotal').value) || 0;
    var rate = parseFloat(document.getElementById('VATRate').value) || 0;
    var vat = sub * rate / 100;
    document.getElementById('VATAmount').value = vat.toFixed(2);
    document.getElementById('TotalValue').value = (sub + vat).toFixed(2);
}
document.addEventListener('DOMContentLoaded', function() {
    if (!document.getElementById('SubTotal').value) calcSalVat();
});
function saveSal(e) {
    e.preventDefault();
    var data = {
        InvoiceNumber: document.getElementById('InvoiceNumber').value.trim() || null,
        ClientCode: document.getElementById('ClientCode').value.trim(),
        PNRNumber: document.getElementById('PNRNumber').value.trim() || null,
        EventName: document.getElementById('EventName').value.trim() || null,
        InvoiceDate: document.getElementById('InvoiceDate').value || null,
        DueDate: document.getElementById('DueDate').value || null,
        SubTotal: parseFloat(document.getElementById('SubTotal').value) || 0,
        VATRate: parseFloat(document.getElementById('VATRate').value) || 0,
        VATAmount: parseFloat(document.getElementById('VATAmount').value) || 0,
        TotalValue: parseFloat(document.getElementById('TotalValue').value) || 0,
        CollectedAmount: document.getElementById('CollectedAmount').value ? parseFloat(document.getElementById('CollectedAmount').value) : null,
        PaymentStatus: document.getElementById('PaymentStatus').value || null,
        CurrencyCode: document.getElementById('CurrencyCode').value || null,
        lines: []
    };
    if (!data.ClientCode) { showFormError('Client Code is required'); return false; }
    var token = localStorage.getItem('access_token');
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/sal/invoices', { method: 'POST', headers: headers, body: JSON.stringify(data) })
        .then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Save failed'); }); return r.json(); })
        .then(function() { window.location.href = '/sal'; })
        .catch(function(err) { showFormError(err.message); });
    return false;
}
function showFormError(msg) {
    document.getElementById('salFormError').textContent = msg; document.getElementById('salFormError').style.display = '';
}
</script>
{% endblock %}
