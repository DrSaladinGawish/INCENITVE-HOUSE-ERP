{% extends "base.html" %}
{% block title %}Backup - IncentiveHouse ERP{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Database Backup</h1>
    <p>Create and download system backups</p>
</div>
<div class="card">
    <div class="card-header">Backup Controls</div>
    <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" onclick="createBackup()">Backup Now</button>
        <span id="backupStatus" style="font-size:13px;color:#666"></span>
    </div>
</div>
<div class="card">
    <div class="card-header">Backup History</div>
    <table><thead><tr><th data-sort="timestamp">Timestamp</th><th data-sort="size">Size</th><th data-sort="status">Status</th><th>Actions</th></tr></thead><tbody id="backupHistory"><tr><td colspan="4" style="text-align:center">Loading...</td></tr></tbody></table>
</div>
<script>
function createBackup() {
    var status = document.getElementById('backupStatus');
    status.textContent = 'Creating backup...';
    fetch('/api/v1/intelligence/backup', {method:'POST', headers:{'Authorization':'Bearer ' + (localStorage.getItem('access_token') || '')}})
        .then(function(r) {return r.json();})
        .then(function(d) {
            status.textContent = d.status === 'ok' ? 'Backup created: ' + d.filename : 'Error: ' + (d.error || 'unknown');
            loadBackupHistory();
        }).catch(function(e) { status.textContent = 'Backup failed'; });
}
function loadBackupHistory() {
    fetch('/api/v1/intelligence/backups', {headers:{'Authorization':'Bearer ' + (localStorage.getItem('access_token') || '')}})
        .then(function(r) {return r.json();})
        .then(function(d) {
            var body = document.getElementById('backupHistory');
            var items = d.backups || d || [];
            if (!items.length) { body.innerHTML = '<tr><td colspan="4" style="text-align:center">No backups yet.</td></tr>'; return; }
            body.innerHTML = items.map(function(b) {
                return '<tr><td>' + (b.created_at || b.timestamp || '') + '</td><td>' + (b.size_mb ? b.size_mb + ' MB' : '-') + '</td><td><span class="badge badge-success">' + (b.status || 'completed') + '</span></td><td>' + (b.download_url ? '<a class="btn btn-sm btn-primary" href="' + b.download_url + '">Download</a>' : '-') + '</td></tr>';
            }).join('');
        });
}
document.addEventListener('DOMContentLoaded', loadBackupHistory);
</script>
{% endblock %}
