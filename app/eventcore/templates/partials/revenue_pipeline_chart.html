<div id="revenue-pipeline-chart" class="card mb-4">
  <div class="card-header d-flex justify-content-between align-items-center bg-light">
    <strong>Revenue Pipeline</strong>
    <span class="badge bg-warning text-dark">LOW CONFIDENCE</span>
  </div>
  <div class="card-body">
    <div class="alert alert-warning small py-2 mb-3">
      9 of 59 sales invoices have amounts ($2.2M total). Source CSV stripped monetary values from 50 invoices.
    </div>
    <div style="height: 260px;">
      <canvas id="pipelineCanvas"></canvas>
    </div>
  </div>
  <div class="card-footer small text-muted">
    Source: GET /api/v1/reports/revenue-pipeline | 15.3% data coverage
  </div>
</div>
<script>
(function() {
  fetch('/api/v1/reports/revenue-pipeline')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      var byMonth = resp.data && resp.data.by_month ? resp.data.by_month : resp.data || [];
      if (!Array.isArray(byMonth) || byMonth.length === 0) {
        document.querySelector('#revenue-pipeline-chart .card-body').innerHTML +=
          '<div class="alert alert-info small">No revenue data available for charting.</div>';
        return;
      }
      var labels = byMonth.map(function(d) { return d.month ? d.month.slice(0, 7) : 'Unknown'; });
      var values = byMonth.map(function(d) { return d.total || 0; });
      var ctx = document.getElementById('pipelineCanvas').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Revenue ($)',
            data: values,
            backgroundColor: 'rgba(255, 193, 7, 0.7)',
            borderColor: 'rgba(255, 193, 7, 1)',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: function(v) { return '$' + (v/1000).toFixed(0) + 'K'; } }
            }
          }
        }
      });
    })
    .catch(function(err) {
      document.querySelector('#revenue-pipeline-chart .card-body').innerHTML +=
        '<div class="alert alert-danger small m-3">Failed to load chart: ' + err.message + '</div>';
    });
})();
</script>
