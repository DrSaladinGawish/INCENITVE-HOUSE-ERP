<div id="dq-dashboard" class="row g-3 mb-4">
  <div class="col-12 text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2">Loading data quality metrics...</p>
  </div>
</div>

<script>
(function() {
  var container = document.getElementById('dq-dashboard');
  if (!container) return;
  fetch('/api/v1/data-quality/summary')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var pct = d.overall_data_density_pct || 0;
      var cash = d.cash_basis_available ? 'Available' : 'Unavailable';
      var cashClass = d.cash_basis_available ? 'text-success' : 'text-danger';
      var densityClass = pct < 5 ? 'text-danger' : (pct < 50 ? 'text-warning' : 'text-success');
      var progressClass = pct < 5 ? 'bg-danger' : (pct < 50 ? 'bg-warning' : 'bg-success');
      var siInfo = d.sales_invoices || {};
      var siPct = siInfo.pct || 0;
      var jvInfo = d.journal_vouchers || {};
      var btInfo = d.bank_transactions || {};
      var piInfo = d.purchase_invoices || {};
      var pvInfo = d.payment_vouchers || {};

      container.innerHTML =
        '<div class="col-md-6 col-lg-4">' +
          '<div class="card border-success h-100">' +
            '<div class="card-body">' +
              '<div class="d-flex justify-content-between align-items-start">' +
                '<div><h6 class="text-muted text-uppercase small mb-1">Trial Balance</h6><h3 class="mb-0 text-success">$857,203.68</h3></div>' +
                '<span class="badge bg-success">HIGH</span>' +
              '</div>' +
              '<div class="small text-muted mt-2">' + jvInfo.total + ' Journal Vouchers — fully balanced</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="col-md-6 col-lg-4">' +
          '<div class="card border-warning h-100">' +
            '<div class="card-body">' +
              '<div class="d-flex justify-content-between align-items-start">' +
                '<div><h6 class="text-muted text-uppercase small mb-1">Revenue Pipeline</h6><h3 class="mb-0 text-warning">$2,231,363.26</h3></div>' +
                '<span class="badge bg-warning text-dark">LOW</span>' +
              '</div>' +
              '<div class="small text-muted mt-2">' + siInfo.with_amount + ' of ' + siInfo.total + ' Sales Invoices (' + siPct + '% coverage)</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="col-md-6 col-lg-4">' +
          '<div class="card h-100">' +
            '<div class="card-body">' +
              '<h6 class="text-muted text-uppercase small mb-1">Data Density</h6>' +
              '<div class="d-flex align-items-end">' +
                '<h3 class="mb-0 ' + densityClass + '">' + pct + '%</h3>' +
                '<span class="small text-muted ms-2 mb-1">of expected financial rows</span>' +
              '</div>' +
              '<div class="progress mt-3" style="height:6px;">' +
                '<div class="progress-bar ' + progressClass + '" style="width:' + Math.min(pct, 100) + '%"></div>' +
              '</div>' +
              '<div class="small text-muted mt-2">Cash basis: <span class="' + cashClass + ' fw-bold">' + cash + '</span></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="col-12 mt-3">' +
          '<div class="card">' +
            '<div class="card-header bg-light"><strong>Gate Status</strong></div>' +
            '<div class="card-body p-0">' +
              '<table class="table table-sm table-hover mb-0">' +
                '<thead class="table-light"><tr><th>Gate</th><th>Status</th><th>Metric</th><th>Threshold</th></tr></thead>' +
                '<tbody>' +
                  '<tr><td>Bank Link (Semantic)</td><td><span class="badge bg-success">PASS</span></td><td>59.2% raw / 94.8% matchable</td><td>&ge;55% / &ge;90%</td></tr>' +
                  '<tr class="table-secondary"><td>Sales Match (Financial)</td><td><span class="badge bg-secondary">BLOCKED</span></td><td>' + siInfo.with_amount + '/' + siInfo.total + ' SI ($' + ((siInfo.total_value || 0)/1000000).toFixed(1) + 'M)</td><td>Permanently</td></tr>' +
                  '<tr><td>Purchase Match</td><td><span class="badge bg-success">PASS</span></td><td>3.58x coverage / 218 matched</td><td>&ge;1.0x / &ge;50%</td></tr>' +
                  '<tr><td>Event ID</td><td><span class="badge bg-success">PASS</span></td><td>365/365</td><td>100%</td></tr>' +
                  '<tr><td>E-Invoice</td><td><span class="badge bg-success">PASS</span></td><td>365/365</td><td>100%</td></tr>' +
                  '<tr><td>Budget Variance</td><td><span class="badge bg-success">PASS</span></td><td>$0</td><td>$0</td></tr>' +
                '</tbody>' +
              '</table>' +
            '</div>' +
            '<div class="card-footer small text-muted">5/6 gates passing. 1 permanently blocked.</div>' +
          '</div>' +
        '</div>' +
        '<div class="col-12 mt-3">' +
          '<div class="card">' +
            '<div class="card-header bg-light"><strong>Row-Level Completeness</strong></div>' +
            '<div class="card-body p-0">' +
              '<table class="table table-sm mb-0">' +
                '<thead class="table-light"><tr><th>Table</th><th class="text-end">Total Rows</th><th class="text-end">With Amount</th><th class="text-end">Coverage</th></tr></thead>' +
                '<tbody>' +
                  '<tr class="table-danger"><td>Bank Transactions</td><td class="text-end">' + btInfo.total + '</td><td class="text-end">' + btInfo.with_amount + '</td><td class="text-end"><span class="badge bg-danger">' + (btInfo.pct || 0) + '%</span></td></tr>' +
                  '<tr class="table-danger"><td>Purchase Invoices</td><td class="text-end">' + piInfo.total + '</td><td class="text-end">' + piInfo.with_amount + '</td><td class="text-end"><span class="badge bg-danger">' + (piInfo.pct || 0) + '%</span></td></tr>' +
                  '<tr class="table-danger"><td>Payment Vouchers</td><td class="text-end">' + pvInfo.total + '</td><td class="text-end">' + pvInfo.with_amount + '</td><td class="text-end"><span class="badge bg-danger">' + (pvInfo.pct || 0) + '%</span></td></tr>' +
                  '<tr class="table-warning"><td>Sales Invoices</td><td class="text-end">' + siInfo.total + '</td><td class="text-end">' + siInfo.with_amount + '</td><td class="text-end"><span class="badge bg-warning text-dark">' + siPct + '%</span></td></tr>' +
                  '<tr class="table-success"><td>Journal Vouchers</td><td class="text-end">' + jvInfo.total + '</td><td class="text-end">' + jvInfo.with_amount + '</td><td class="text-end"><span class="badge bg-success">' + (jvInfo.pct || 0) + '%</span></td></tr>' +
                '</tbody>' +
              '</table>' +
            '</div>' +
          '</div>' +
        '</div>';
    })
    .catch(function() {
      container.innerHTML =
        '<div class="col-12"><div class="alert alert-danger">Failed to load data quality metrics.</div></div>';
    });
})();
</script>
