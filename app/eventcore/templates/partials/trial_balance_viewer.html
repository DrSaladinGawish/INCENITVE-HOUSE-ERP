<div id="trial-balance-view">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Trial Balance</h4>
    <span class="badge bg-success fs-6">HIGH CONFIDENCE</span>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-sm table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Account</th>
            <th class="text-end">Entries</th>
            <th class="text-end">Debit ($)</th>
            <th class="text-end">Credit ($)</th>
          </tr>
        </thead>
        <tbody id="tb-body">
          <tr>
            <td colspan="4" class="text-center py-4">
              <div class="spinner-border spinner-border-sm text-primary"></div>
              <span class="ms-2 text-muted">Loading trial balance...</span>
            </td>
          </tr>
        </tbody>
        <tfoot id="tb-foot" class="table-group-divider fw-bold" style="display:none">
          <tr class="table-success">
            <td>TOTAL</td>
            <td class="text-end" id="tb-entries"></td>
            <td class="text-end" id="tb-debit-total"></td>
            <td class="text-end" id="tb-credit-total"></td>
          </tr>
          <tr id="tb-balanced-row" style="display:none">
            <td colspan="4" class="text-center small text-success fw-bold">&#10004; Balanced</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
  <div class="mt-3 small text-muted">
    Source: Journal Vouchers. This is the only 100% complete financial dataset in EventCore.
    All other monetary rows were stripped by the source CSV export.
  </div>
</div>

<script>
(function() {
  var body = document.getElementById('tb-body');
  var foot = document.getElementById('tb-foot');
  if (!body) return;
  fetch('/api/v1/reports/trial-balance')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      var data = resp.data;
      var rows = [];
      if (data.debit_balances) {
        data.debit_balances.forEach(function(b) {
          b._side = 'debit';
          rows.push(b);
        });
      }
      if (data.credit_balances) {
        data.credit_balances.forEach(function(b) {
          b._side = 'credit';
          rows.push(b);
        });
      }
      var fmt = function(v) {
        if (v == null) return '-';
        return '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      };
      var html = rows.map(function(r) {
        return '<tr>' +
          '<td>' + r.account + '</td>' +
          '<td class="text-end">' + r.entries + '</td>' +
          '<td class="text-end">' + (r._side === 'debit' ? fmt(r.total) : '-') + '</td>' +
          '<td class="text-end">' + (r._side === 'credit' ? fmt(r.total) : '-') + '</td>' +
        '</tr>';
      }).join('');
      body.innerHTML = html;
      foot.style.display = '';
      document.getElementById('tb-entries').textContent = data.total_entries;
      document.getElementById('tb-debit-total').textContent = fmt(data.total_debit);
      document.getElementById('tb-credit-total').textContent = fmt(data.total_credit);
      if (data.balanced) {
        document.getElementById('tb-balanced-row').style.display = '';
      }
    })
    .catch(function() {
      body.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Failed to load trial balance.</td></tr>';
    });
})();
</script>
