<header class="ih-top-header">

      <rect width="32" height="32" rx="6" fill="#c9a227"/>
      <path d="M8 22V10l8 6-8 6zM16 22V10l8 6-8 6z" fill="#1a2332"/>

    <div>
      <div class="ih-brand-name">Incentive House</div>
