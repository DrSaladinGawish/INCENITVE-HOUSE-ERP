<div id="payment-voucher-form" class="card mb-4">
  <div class="card-header bg-light">
    <strong>New Payment Voucher</strong>
    <span class="badge bg-info ms-2">Future-proof data entry</span>
  </div>
  <div class="card-body">
    <form hx-post="/api/v1/payment-vouchers" hx-target="#pv-result" hx-swap="innerHTML">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label small text-muted">Job</label>
          <input type="text" name="job_id" class="form-control form-control-sm" placeholder="JOB-001" required>
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted">Vendor</label>
          <input type="text" name="vendor_id" class="form-control form-control-sm" placeholder="VEN-001">
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted">Amount ($)</label>
          <input type="number" name="amount" class="form-control form-control-sm" step="0.01" min="0" required>
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted">Payment Date</label>
          <input type="date" name="payment_date" class="form-control form-control-sm" required>
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted">Method</label>
          <select name="payment_method" class="form-select form-select-sm">
            <option value="bank_transfer">Bank Transfer</option>
            <option value="cash">Cash</option>
            <option value="check">Check</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted">Reference #</label>
          <input type="text" name="reference_number" class="form-control form-control-sm">
        </div>
        <div class="col-12">
          <label class="form-label small text-muted">Description</label>
          <textarea name="description" class="form-control form-control-sm" rows="2"></textarea>
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-sm btn-primary">Create Voucher</button>
        <span id="pv-result" class="ms-2"></span>
      </div>
    </form>
  </div>
</div>
