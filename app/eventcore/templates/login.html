<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventCore ERP — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/eventcore.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0f1923 100%);
    }
    .login-card {
      background: #1e2d3d;
      border: 1px solid #2a3a4e;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-card .brand h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.75rem;
      color: #e8d5b7;
      margin-bottom: 0.25rem;
    }
    .login-card .brand p {
      color: #8a9aa8;
      font-size: 0.85rem;
    }
    .login-card .form-label {
      color: #c0ccd6;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .login-card .form-control {
      background: #0f1923;
      border: 1px solid #2a3a4e;
      color: #e8edf0;
      border-radius: 8px;
      padding: 0.7rem 1rem;
    }
    .login-card .form-control:focus {
      border-color: #c8a96e;
      box-shadow: 0 0 0 2px rgba(200,169,110,0.2);
    }
    .login-card .btn-primary {
      background: #c8a96e;
      border: none;
      color: #0f1923;
      font-weight: 600;
      padding: 0.7rem;
      border-radius: 8px;
      width: 100%;
      transition: background 0.2s;
    }
    .login-card .btn-primary:hover {
      background: #d4b87a;
    }
    .login-card .alert {
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .login-card .footer-text {
      text-align: center;
      color: #6a7a88;
      font-size: 0.75rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <h1>EventCore ERP</h1>
        <p>Incentive House — Job P&amp;L System</p>
      </div>
      <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@incentivehouse.com" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </form>
      <div class="footer-text">
        &copy; 2026 Incentive House &mdash; EventCore ERP v1.0.0
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alert = document.getElementById('loginAlert');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginBtnSpinner');

      alert.classList.add('d-none');
      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      spinner.classList.remove('d-none');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          alert.textContent = data.detail || 'Login failed';
          alert.classList.remove('d-none');
          return;
        }
        localStorage.setItem('token', data.access_token);
        window.location.href = '/dashboard';
      } catch (err) {
        alert.textContent = 'Network error. Is the server running?';
        alert.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        spinner.classList.add('d-none');
      }
    }

    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
