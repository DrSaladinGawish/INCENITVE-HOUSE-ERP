services:
  api:
    build: .
    image: ghcr.io/drsaladingawish/incenitve-house-erp:latest
    container_name: incentivehouse-erp
    ports:
      - "9001:9001"
    env_file:
      - .env
    environment:
      - SQL_SERVER=sqlserver
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./data:/app/data
      - ./migrations:/app/migrations
      - metrics-data:/app/data/metrics
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - ihe-net

  redis:
    image: redis:7-alpine
    container_name: ihe-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ihe-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ihe-sqlserver
    profiles:
      - local
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD:-IHE_ERP_2024!}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - ihe-net

volumes:
  sqlserver-data:
  redis-data:
  metrics-data:

networks:
  ihe-net:
    driver: bridge
